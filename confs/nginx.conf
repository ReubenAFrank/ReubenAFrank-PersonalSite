
#user  nobody;
worker_processes  1;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;


events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    #log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
    #                  '$status $body_bytes_sent "$http_referer" '
    #                  '"$http_user_agent" "$http_x_forwarded_for"';

    #access_log  logs/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    #keepalive_timeout  0;
    keepalive_timeout  65;

    #gzip  on;
	
	server {

		listen 80;
		server_name localhost;
		
		location / {
			proxy_pass http://127.0.0.1:8000;
			proxy_http_version 1.1;
			
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection "upgrade";
			
			proxy_set_header Host $http_host;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			
			proxy_redirect off;
			
			proxy_read_timeout 86400s; # Optional: Prevents Nginx from timing out long-lived connections
			
		}
		
		location /static/ {
			root C:/pathto/ReubenAFrank-PersonalSite/project;
		}
		
		#location /static/admin/css/ {
		#	alias D:/daaata/PycharmProjects/PollingAppExample/djangotutorial/static/admin/css;
		#}
		
		#location /static/admin/js/ {
